<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Finances</title>

  <script src="https://kit.webawesome.com/fb84f228d5bd4f19.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--wa-color-surface-sunken, #f5f5f5);
      margin: 0;
      font-family: var(--wa-font-sans, system-ui, sans-serif);
    }
    .card {
      background: var(--wa-color-surface-default, #fff);
      border-radius: var(--wa-border-radius-l, 12px);
      box-shadow: var(--wa-shadow-m, 0 4px 24px rgba(0,0,0,0.08));
      padding: 3rem 4rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--wa-color-text-loud, #111);
      margin: 0 0 0.5rem;
    }
    .card p.subtitle {
      color: var(--wa-color-text-quiet, #666);
      margin: 0 0 1.5rem;
    }
    #auth-message {
      margin-top: 1rem;
      text-align: left;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Enter your email to receive a one-time code.</p>

    <form hx-post="/auth/request" hx-target="#auth-message" hx-swap="innerHTML">
      <wa-input
        id="email"
        name="email"
        type="email"
        placeholder="you@example.com"
        autocomplete="email"
        required
        style="width:100%;"
      ></wa-input>
      <wa-button type="submit" variant="brand" style="width:100%;">Continue</wa-button>
    </form>

    <div id="auth-message"></div>
  </div>
</body>
</html>
