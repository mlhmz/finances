<div id="otp-section">
  <p style="color:var(--wa-color-text-quiet,#666);margin:0 0 1rem;">
    Enter the 8-character code sent to your console.
  </p>
  <form hx-post="/auth/verify" hx-target="#auth-message" hx-swap="innerHTML">
    <input type="hidden" name="email" value="{{.Email}}" />
    <wa-input
      id="otp-code"
      name="code"
      placeholder="e.g. X4K9P2WR"
      maxlength="8"
      autocomplete="one-time-code"
      style="width:100%;margin-bottom:1rem;text-transform:uppercase;"
      required
    ></wa-input>
    <wa-button type="submit" variant="brand" style="width:100%;">Verify Code</wa-button>
  </form>
</div>
