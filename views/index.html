<style>
  .main {
    padding: 2.5rem 2rem;
    max-width: 900px;
  }

  .welcome { margin-bottom: 2rem; }

  .welcome-greeting {
    font-size: 1.625rem;
    font-weight: 700;
    color: var(--wa-color-text-loud, #111);
    margin: 0 0 0.25rem;
    letter-spacing: -0.03em;
  }

  .welcome-sub {
    font-size: 0.9375rem;
    color: var(--wa-color-text-quiet, #666);
    margin: 0;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }

  .nav-card {
    background: var(--wa-color-surface-default, #fff);
    border-radius: var(--wa-border-radius-l, 12px);
    padding: 1.5rem;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    text-decoration: none;
    color: inherit;
    border: 1px solid var(--wa-color-border-quiet, #e5e7eb);
    transition: box-shadow 0.15s, transform 0.15s;
  }

  .nav-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    transform: translateY(-1px);
  }

  .nav-card wa-icon {
    font-size: 1.375rem;
    color: var(--wa-color-primary-600, #2563eb);
    margin-bottom: 0.75rem;
  }

  .nav-card-label {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--wa-color-text-loud, #111);
  }

  .placeholder-card {
    background: var(--wa-color-surface-default, #fff);
    border-radius: var(--wa-border-radius-l, 12px);
    padding: 1.5rem;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--wa-color-text-quiet, #999);
    font-size: 0.875rem;
    border: 1.5px dashed var(--wa-color-border-quiet, #e5e7eb);
    text-align: center;
  }

  .placeholder-card wa-icon {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    opacity: 0.3;
  }

  .mobile-header-brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: inherit;
  }

  .mobile-header-brand wa-icon {
    color: var(--wa-color-primary-600, #2563eb);
    font-size: 1.25rem;
  }

  .mobile-header-name {
    font-size: 1.0625rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  @media (max-width: 480px) {
    .main { padding: 1.5rem 1rem; }
  }
</style>

<!-- Mobile header -->
<header class="mobile-header">
  <a href="/" class="mobile-header-brand">
    <wa-icon name="coins"></wa-icon>
    <span class="mobile-header-name">Finances</span>
  </a>
</header>

<main class="main">
  <div class="welcome">
    <h1 class="welcome-greeting">Welcome back, {{.User.FullName}}.</h1>
    <p class="welcome-sub">Your financial overview is below.</p>
  </div>

  <div class="card-grid">
    <a href="/transactions" class="nav-card">
      <wa-icon name="arrow-up-arrow-down"></wa-icon>
      <span class="nav-card-label">Transactions</span>
    </a>

    <div class="placeholder-card">
      <wa-icon name="wallet"></wa-icon>
      Accounts coming soon
    </div>

    <div class="placeholder-card">
      <wa-icon name="chart-line"></wa-icon>
      Reports coming soon
    </div>
  </div>
</main>
