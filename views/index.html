<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>

  <!-- Web Awesome (Font Awesome 6 Pro via CDN free tier) -->
  <link rel="stylesheet" href="https://early.webawesome.com/webawesome@2.0.0-alpha.10/dist/styles/themes/default.css" />
  <link rel="stylesheet" href="https://early.webawesome.com/webawesome@2.0.0-alpha.10/dist/styles/webawesome.css" />
  <script type="module" src="https://early.webawesome.com/webawesome@2.0.0-alpha.10/dist/webawesome.loader.js"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--wa-color-surface-sunken, #f5f5f5);
      margin: 0;
      font-family: var(--wa-font-sans, system-ui, sans-serif);
    }

    .card {
      background: var(--wa-color-surface-default, #fff);
      border-radius: var(--wa-border-radius-l, 12px);
      box-shadow: var(--wa-shadow-m, 0 4px 24px rgba(0,0,0,0.08));
      padding: 3rem 4rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .card h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--wa-color-text-loud, #111);
      margin: 0.5rem 0 0.25rem;
    }

    .card p {
      color: var(--wa-color-text-quiet, #666);
      margin: 0 0 1.5rem;
    }

    #greeting {
      margin-top: 1rem;
      min-height: 1.5rem;
      color: var(--wa-color-success-600, #16a34a);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <wa-icon name="coins" style="font-size:3rem; color: var(--wa-color-primary-600, #2563eb);"></wa-icon>
    <h1>{{.Title}}</h1>
    <p>Your personal finance tracker — powered by Go &amp; HTMX.</p>

    <wa-button
      variant="brand"
      hx-get="/greet"
      hx-target="#greeting"
      hx-swap="innerHTML"
    >
      Say Hello
    </wa-button>

    <div id="greeting"></div>
  </div>
</body>
</html>
