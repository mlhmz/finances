<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Finances</title>

  <script src="https://kit.webawesome.com/fb84f228d5bd4f19.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--wa-color-surface-sunken, #f5f5f5);
      margin: 0;
      font-family: var(--wa-font-sans, system-ui, sans-serif);
    }
    .card {
      background: var(--wa-color-surface-default, #fff);
      border-radius: var(--wa-border-radius-l, 12px);
      box-shadow: var(--wa-shadow-m, 0 4px 24px rgba(0,0,0,0.08));
      padding: 3rem 4rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--wa-color-text-loud, #111);
      margin: 0 0 0.5rem;
    }
    .card p.subtitle {
      color: var(--wa-color-text-quiet, #666);
      margin: 0 0 1.5rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-align: left;
    }
    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--wa-color-text-loud, #111);
      display: block;
      margin-bottom: 0.25rem;
    }
    .error {
      color: var(--wa-color-danger-600, #c0392b);
      font-size: 0.875rem;
      margin: 0.25rem 0 0;
    }
    #otp-message { margin-top: 1rem; }
    select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--wa-color-border-quiet, #ddd);
      border-radius: var(--wa-border-radius-s, 6px);
      font-size: 1rem;
      background: var(--wa-color-surface-default, #fff);
      color: var(--wa-color-text-loud, #111);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create account</h1>
    <p class="subtitle">One more step to get started.</p>

    {{if .Error}}
      <p class="error">{{.Error}}</p>
    {{end}}

    {{if .ShowOTP}}
      <!-- OTP entry after successful registration -->
      <p style="color:var(--wa-color-text-quiet,#666);margin:0 0 1rem;">
        A one-time code has been printed to the server console.
      </p>
      <form hx-post="/auth/verify" hx-target="#otp-message" hx-swap="innerHTML">
        <input type="hidden" name="email" value="{{.Email}}" />
        <div>
          <label for="otp-code">Verification Code</label>
          <wa-input
            id="otp-code"
            name="code"
            placeholder="e.g. X4K9P2WR"
            maxlength="8"
            autocomplete="one-time-code"
            style="width:100%;text-transform:uppercase;"
            required
          ></wa-input>
        </div>
        <wa-button type="submit" variant="brand" style="width:100%;margin-top:0.5rem;">Verify Code</wa-button>
      </form>
      <div id="otp-message"></div>
    {{else}}
      <!-- Registration form -->
      <form method="post" action="/register">
        <div>
          <label for="reg-email">Email</label>
          <wa-input
            id="reg-email"
            name="email"
            type="email"
            value="{{.Email}}"
            readonly
            style="width:100%;opacity:0.75;"
          ></wa-input>
        </div>
        <div>
          <label for="reg-name">Full Name</label>
          <wa-input
            id="reg-name"
            name="full_name"
            type="text"
            placeholder="Ada Lovelace"
            autocomplete="name"
            required
            style="width:100%;"
          ></wa-input>
        </div>
        <div>
          <label for="reg-currency">Currency</label>
          <select id="reg-currency" name="currency" required>
            {{range .Currencies}}
              <option value="{{.}}">{{.}}</option>
            {{end}}
          </select>
        </div>
        <wa-button type="submit" variant="brand" style="width:100%;margin-top:0.5rem;">Create Account</wa-button>
      </form>
    {{end}}
  </div>
</body>
</html>
